[pytest]
addopts = --alluredir=allure-results -v
markers =
    auth: authentication flow tests
    user_crud: user CRUD tests
    profile_settings: profile settings tests
    employees: employee CRUD tests
    employee_user: employee-user link tests
    employee_ref_data: employee reference data tests (departments, roles, permissions, org, projects)
    employee_contact_info: employee address / email / phone tests
    employee_emergency_contacts: employee emergency contact tests
    employee_metadata: employee audit log, status history, preferences, settings, SSN tests
